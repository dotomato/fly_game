<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情侣飞行棋</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lobby-container">
    <div class="lobby-card">

      <!-- 标题 -->
      <div class="lobby-header">
        <h1>💕 情侣飞行棋</h1>
        <p id="lobbySubtitle">与最爱的人一起踏上这段旅程</p>
      </div>

      <!-- 加入/创建表单 -->
      <div id="joinForm" class="join-form active">
        <div class="form-group">
          <label for="playerName">你的名字</label>
          <input type="text" id="playerName" placeholder="输入你的名字" maxlength="12" autocomplete="off" />
        </div>
        <input type="hidden" id="roomId" />
        <div class="form-group" id="scriptIdGroup">
          <label for="scriptId">选择剧本</label>
          <div class="select-wrapper">
            <select id="scriptId">
              <option value="">加载中...</option>
            </select>
          </div>
          <p class="max-note">注：加入已有房间时，剧本以房主创建时选择的为准</p>
        </div>
        <div class="form-group">
          <label>选择你的棋子</label>
          <div class="emoji-picker" id="emojiPicker">
            <div class="emoji-option selected" data-emoji="🐱">🐱</div>
            <div class="emoji-option" data-emoji="🐶">🐶</div>
            <div class="emoji-option" data-emoji="🐰">🐰</div>
            <div class="emoji-option" data-emoji="🦊">🦊</div>
            <div class="emoji-option" data-emoji="🐻">🐻</div>
            <div class="emoji-option" data-emoji="🐼">🐼</div>
            <div class="emoji-option" data-emoji="🐨">🐨</div>
            <div class="emoji-option" data-emoji="🐯">🐯</div>
            <div class="emoji-option" data-emoji="🦁">🦁</div>
            <div class="emoji-option" data-emoji="🐸">🐸</div>
            <div class="emoji-option" data-emoji="🐧">🐧</div>
            <div class="emoji-option" data-emoji="🐦">🐦</div>
            <div class="emoji-option" data-emoji="🦆">🦆</div>
            <div class="emoji-option" data-emoji="🦋">🦋</div>
            <div class="emoji-option" data-emoji="🐙">🐙</div>
            <div class="emoji-option" data-emoji="🦄">🦄</div>
            <div class="emoji-option" data-emoji="🐲">🐲</div>
            <div class="emoji-option" data-emoji="🌸">🌸</div>
            <div class="emoji-option" data-emoji="🌺">🌺</div>
            <div class="emoji-option" data-emoji="🌻">🌻</div>
            <div class="emoji-option" data-emoji="🌼">🌼</div>
            <div class="emoji-option" data-emoji="🌹">🌹</div>
            <div class="emoji-option" data-emoji="🍀">🍀</div>
            <div class="emoji-option" data-emoji="🌵">🌵</div>
            <div class="emoji-option" data-emoji="🍄">🍄</div>
            <div class="emoji-option" data-emoji="🎋">🎋</div>
            <div class="emoji-option" data-emoji="🍎">🍎</div>
            <div class="emoji-option" data-emoji="🍊">🍊</div>
            <div class="emoji-option" data-emoji="🍋">🍋</div>
            <div class="emoji-option" data-emoji="🍇">🍇</div>
            <div class="emoji-option" data-emoji="🍓">🍓</div>
            <div class="emoji-option" data-emoji="🍑">🍑</div>
            <div class="emoji-option" data-emoji="🍕">🍕</div>
            <div class="emoji-option" data-emoji="🍔">🍔</div>
            <div class="emoji-option" data-emoji="🍜">🍜</div>
            <div class="emoji-option" data-emoji="🍣">🍣</div>
            <div class="emoji-option" data-emoji="🍦">🍦</div>
            <div class="emoji-option" data-emoji="🧁">🧁</div>
            <div class="emoji-option" data-emoji="🍩">🍩</div>
            <div class="emoji-option" data-emoji="☕">☕</div>
            <div class="emoji-option" data-emoji="🍅">🍅</div>
          </div>
          <p class="max-note">注：若已有人选择相同棋子，将自动分配其他棋子</p>
        </div>
        <button class="btn btn-primary" id="joinBtn" onclick="joinRoom()">创建房间</button>
        <div class="error-msg" id="joinError"></div>
      </div>

      <!-- 等待室 -->
      <div id="waitingRoom" class="waiting-room">
        <div class="room-info">
          <span>🚪 房间：</span>
          <span class="room-id-display" id="roomIdDisplay">—</span>
          <span id="roomCountDisplay" class="room-count"></span>
        </div>
        <div class="room-info room-info-script" id="scriptDisplay">
          <span>📖 剧本：</span>
          <span id="scriptNameDisplay" style="font-weight:600;color:var(--primary)">—</span>
        </div>
        <!-- 房间链接分享 -->
        <div class="share-row" id="shareRow">
          <input class="share-link-input" id="shareLinkInput" readonly />
          <button class="share-btn" id="shareBtn" onclick="shareRoom()">🔗 分享</button>
        </div>
        <div class="form-group">
          <label>等待玩家加入</label>
          <ul class="player-list" id="playerList"></ul>
        </div>
        <p class="waiting-tip" id="waitingTip">等待其他玩家加入...</p>
        <button class="btn btn-success" id="startBtn" onclick="startGame()" disabled>开始游戏</button>
        <div class="error-msg" id="waitError"></div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myRoomId = null;
    let isJoining = false; // true=通过分享链接加入，false=创建新房间
    let myPlayerIndex = null;
    let isHost = false;
    let currentRoomState = null;
    let scriptsIndex = []; // 从服务端加载的剧本列表

    // 动态加载剧本选项
    (async () => {
      try {
        const res = await fetch('api/scripts');
        scriptsIndex = await res.json();
        const sel = document.getElementById('scriptId');
        sel.innerHTML = '';
        scriptsIndex.forEach((s, i) => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.name}（${s.taskCount} 格）`;
          if (i === 0) opt.selected = true;
          sel.appendChild(opt);
        });
      } catch (e) {
        console.warn('剧本列表加载失败', e);
      }
    })();

    // emoji 选择器
    document.getElementById('emojiPicker').addEventListener('click', e => {
      const opt = e.target.closest('.emoji-option');
      if (!opt) return;
      document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
      opt.classList.add('selected');
    });

    // 从 URL 参数自动填写房间号，否则自动生成
    (function () {
      const p = new URLSearchParams(location.search);
      const room = p.get('room');
      if (room) {
        isJoining = true;
        document.getElementById('roomId').value = room;
        document.getElementById('scriptIdGroup').style.display = 'none';
        document.getElementById('lobbySubtitle').textContent = '朋友邀请你加入房间，填写名字即可加入 🎉';
        document.getElementById('joinBtn').textContent = '加入房间';
        history.replaceState(null, '', location.pathname);
      } else {
        // 自动生成房间ID
        const generated = Math.random().toString(36).slice(2, 8).toUpperCase();
        document.getElementById('roomId').value = generated;
        document.getElementById('lobbySubtitle').textContent = `房间号：${generated}　分享给朋友一起玩吧 🎲`;
      }
      document.getElementById('playerName').focus();

      // 从 cookie 读取上次使用的名字
      const savedName = getCookie('playerName');
      if (savedName) document.getElementById('playerName').value = savedName;
    })();

    // 自动聚焦
    document.getElementById('playerName').focus();

    // 回车提交
    document.getElementById('playerName').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinRoom();
    });

    function getCookie(name) {
      return document.cookie.split(';').map(c => c.trim()).reduce((acc, c) => {
        const [k, v] = c.split('=');
        return k === name ? decodeURIComponent(v || '') : acc;
      }, '');
    }

    function setCookie(name, value, days) {
      const exp = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)};expires=${exp};path=/`;
    }

    function showError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function joinRoom() {
      const playerName = document.getElementById('playerName').value.trim();
      const roomId = document.getElementById('roomId').value.trim();

      if (!playerName) { showError('joinError', '请输入你的名字'); return; }

      document.getElementById('joinBtn').disabled = true;
      document.getElementById('joinBtn').textContent = '连接中...';

      // 保存名字到 cookie（30天）
      setCookie('playerName', playerName, 30);

      const selectedEmoji = document.querySelector('.emoji-option.selected')?.dataset.emoji || '🐱';
      socket.emit('join-room', { roomId, playerName, maxPlayers: 4, scriptId: document.getElementById('scriptId').value, emoji: selectedEmoji });
    }

    function startGame() {
      if (!myRoomId) return;
      socket.emit('start-game', { roomId: myRoomId });
    }

    function shareRoom() {
      const input = document.getElementById('shareLinkInput');
      const url = input.value;
      const btn = document.getElementById('shareBtn');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => {
          btn.textContent = '✅ 已复制';
          setTimeout(() => { btn.textContent = '🔗 分享'; }, 2000);
        }).catch(() => {
          input.select();
          alert('自动复制失败，请手动复制上方链接');
        });
      } else {
        input.select();
        const ok = document.execCommand('copy');
        if (ok) {
          btn.textContent = '✅ 已复制';
          setTimeout(() => { btn.textContent = '🔗 分享'; }, 2000);
        } else {
          alert('自动复制失败，请手动复制上方链接');
        }
      }
    }

    // 服务器响应：成功加入
    socket.on('joined', ({ roomId, playerIndex }) => {
      myRoomId = roomId;
      myPlayerIndex = playerIndex;
      document.getElementById('joinForm').classList.remove('active');
      document.getElementById('waitingRoom').classList.add('active');
      document.getElementById('roomIdDisplay').textContent = roomId;
      // 生成分享链接
      const shareUrl = `${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
      document.getElementById('shareLinkInput').value = shareUrl;
    });

    // 房间状态更新
    socket.on('room-update', (state) => {
      currentRoomState = state;
      isHost = state.hostId === socket.id;
      renderWaitingRoom(state);
    });

    // 游戏开始，跳转到游戏页
    socket.on('game-started', (state) => {
      const playerName = document.getElementById('playerName').value.trim();
      const scriptId = state.scriptId || 'couples';
      const url = `game.html?roomId=${encodeURIComponent(myRoomId)}&name=${encodeURIComponent(playerName)}&idx=${myPlayerIndex}&script=${encodeURIComponent(scriptId)}`;
      // 主动断开旧 socket，避免跳转后旧连接触发断线逻辑
      socket.disconnect();
      window.location.href = url;
    });

    // 错误
    socket.on('error', ({ message }) => {
      document.getElementById('joinBtn').disabled = false;
      document.getElementById('joinBtn').textContent = isJoining ? '加入房间' : '创建房间';
      showError('joinError', message);
    });

    function renderWaitingRoom(state) {
      const list = document.getElementById('playerList');
      list.innerHTML = '';
      state.players.forEach((p, i) => {
        const li = document.createElement('li');
        li.className = 'player-item';
        const isMe = p.socketId === socket.id;
        li.innerHTML = `
          <span class="player-emoji">${p.emoji}</span>
          <span class="player-name">${escapeHtml(p.name)}${isMe ? ' <span class="me-tag">(我)</span>' : ''}</span>
          ${i === 0 ? '<span class="host-badge">房主</span>' : ''}
        `;
        list.appendChild(li);
      });

      document.getElementById('roomCountDisplay').textContent = `${state.players.length}/${state.maxPlayers} 人`;

      // 显示当前剧本
      const scriptNameEl = document.getElementById('scriptNameDisplay');
      if (scriptNameEl) {
        const found = scriptsIndex.find(s => s.id === state.scriptId);
        scriptNameEl.textContent = found ? found.name : (state.scriptId || '—');
      }

      const startBtn = document.getElementById('startBtn');
      if (isHost) {
        startBtn.disabled = state.players.length < 2;
        startBtn.textContent = state.players.length < 2
          ? `等待更多玩家（至少2人）`
          : `开始游戏 (${state.players.length}人)`;
      } else {
        startBtn.disabled = true;
        startBtn.textContent = '等待房主开始游戏...';
      }

      document.getElementById('waitingTip').textContent = isHost
        ? (state.players.length < 2 ? '等待其他玩家加入...' : '人数满足，可以开始了！')
        : `等待房主（${state.players[0]?.name || ''}）开始游戏...`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
